<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 게시판 플레이어</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  cursor: none;
}
#player {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
#player img, #player video {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
#player img.cover, #player video.cover {
  object-fit: cover;
  width: 100%;
  height: 100%;
}

/* 전환 효과 */
.media-element {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.media-element.active {
  opacity: 1;
}
.media-element.fade-out {
  opacity: 0;
}

/* 대기 화면 */
#idle-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: rgba(255,255,255,0.3);
}
#idle-screen .icon { font-size: 64px; margin-bottom: 16px; }
#idle-screen .text { font-size: 16px; font-family: 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div id="player">
  <div id="idle-screen">
    <div class="icon">📺</div>
    <div class="text">편성표 수신 대기 중...</div>
  </div>
</div>

<script>
const player = document.getElementById('player');
const idleScreen = document.getElementById('idle-screen');

let schedule = null;
let currentIndex = -1;
let playTimer = null;
let hostUrl = '';

// 설정 로드
window.signage.getConfig().then(cfg => {
  hostUrl = cfg.hostUrl || '';
});

// 편성표 수신
window.signage.onScheduleUpdate((data) => {
  console.log('[Player] 편성표 수신:', data);
  schedule = data;
  if (schedule && schedule.entries && schedule.entries.length > 0) {
    startPlayback();
  }
});

// 재생 명령 수신
window.signage.onPlayCommand((files) => {
  console.log('[Player] 재생 명령:', files);
  // 수동 재생 명령 처리
  playFiles(files);
});

// 정지 명령
window.signage.onStopCommand(() => {
  stopPlayback();
});

function startPlayback() {
  if (!schedule || !schedule.entries || schedule.entries.length === 0) return;

  // 활성 항목만 필터링
  const activeEntries = schedule.entries.filter(e => e.active !== false);
  if (activeEntries.length === 0) {
    showIdle();
    return;
  }

  idleScreen.style.display = 'none';
  currentIndex = -1;
  playNext(activeEntries);
}

function playNext(entries) {
  if (!entries || entries.length === 0) return;

  currentIndex = (currentIndex + 1) % entries.length;
  const entry = entries[currentIndex];

  // 유효기간 체크
  if (entry.validFrom || entry.validTo) {
    const now = new Date();
    if (entry.validFrom && new Date(entry.validFrom) > now) {
      playNext(entries);
      return;
    }
    if (entry.validTo && new Date(entry.validTo) < now) {
      playNext(entries);
      return;
    }
  }

  // url이 상대경로(/uploads/...)이면 hostUrl 프리픽스 추가
  let url = entry.url || (entry.filename ? `/uploads/${entry.filename}` : '');
  if (url && url.startsWith('/') && hostUrl) {
    url = hostUrl + url;
  }
  if (!url) {
    playNext(entries);
    return;
  }

  const duration = (entry.duration || 10) * 1000;
  const mimeType = entry.mimeType || '';
  const fitMode = entry.fitMode || 'contain';

  // 기존 미디어 제거
  const existing = player.querySelector('.media-element');
  if (existing) {
    existing.classList.remove('active');
    existing.classList.add('fade-out');
    setTimeout(() => existing.remove(), 1000);
  }

  const container = document.createElement('div');
  container.className = 'media-element';

  if (mimeType.startsWith('video/')) {
    const video = document.createElement('video');
    video.src = url;
    video.autoplay = true;
    video.muted = entry.sound === 'none' || !entry.sound;
    video.loop = false;
    video.className = fitMode === 'cover' ? 'cover' : '';
    video.onended = () => playNext(entries);
    container.appendChild(video);
    player.appendChild(container);
    setTimeout(() => container.classList.add('active'), 50);
    // 영상은 끝나면 다음으로 (duration 무시 가능)
    if (playTimer) clearTimeout(playTimer);
  } else {
    const img = document.createElement('img');
    img.src = url;
    img.className = fitMode === 'cover' ? 'cover' : '';
    container.appendChild(img);
    player.appendChild(container);
    setTimeout(() => container.classList.add('active'), 50);
    // 이미지는 duration 후 다음
    if (playTimer) clearTimeout(playTimer);
    playTimer = setTimeout(() => playNext(entries), duration);
  }
}

function playFiles(files) {
  // 수동 재생 명령용
  idleScreen.style.display = 'none';
  const entries = files.map(f => ({
    url: `${hostUrl}${f.url}`,
    mimeType: f.mimeType,
    duration: 10,
    active: true
  }));
  currentIndex = -1;
  playNext(entries);
}

function stopPlayback() {
  if (playTimer) {
    clearTimeout(playTimer);
    playTimer = null;
  }
  const existing = player.querySelectorAll('.media-element');
  existing.forEach(el => el.remove());
  showIdle();
}

function showIdle() {
  idleScreen.style.display = 'flex';
}
</script>
</body>
</html>
