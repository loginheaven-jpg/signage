<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 게시판 플레이어</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  cursor: none;
}
#player {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* 미디어 레이어 (전환 효과) */
.media-element {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.media-element.active { opacity: 1; }
.media-element.fade-out { opacity: 0; }

/* 분할(split) 레이아웃: 좌/우 나란히 */
.media-element.split { flex-direction: row; }
.media-element.split .pane {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.media-element img, .media-element video {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.media-element img.cover, .media-element video.cover {
  object-fit: cover;
  width: 100%;
  height: 100%;
}

/* 대기 화면 */
#idle-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: rgba(255,255,255,0.3);
}
#idle-screen .icon { font-size: 64px; margin-bottom: 16px; }
#idle-screen .text { font-size: 16px; font-family: 'Segoe UI', sans-serif; }

/* 일시정지 오버레이 */
#pause-overlay {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  z-index: 300;
  pointer-events: none;
}
#pause-overlay.show { display: flex; }
#pause-overlay .icon { font-size: 72px; margin-bottom: 12px; }
#pause-overlay .text { font-size: 18px; color: rgba(255,255,255,0.85); }

/* 화면 하단 컨트롤 바 (마우스 움직이면 표시) */
#control-bar {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  display: flex; gap: 10px;
  background: rgba(20,20,30,0.85);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 14px;
  z-index: 400;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  font-family: 'Segoe UI', sans-serif;
}
#control-bar.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
#control-bar button {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
#control-bar button:hover { background: rgba(255,255,255,0.18); }
#control-bar button.danger:hover { background: rgba(231,76,60,0.85); }
#control-bar .sep { width: 1px; background: rgba(255,255,255,0.15); margin: 4px 2px; }
body.controls-visible { cursor: default; }
</style>
</head>
<body>
<div id="player">
  <div id="idle-screen">
    <div class="icon">📺</div>
    <div class="text">편성표 수신 대기 중...</div>
  </div>
</div>

<!-- 일시정지 오버레이 -->
<div id="pause-overlay">
  <div class="icon">⏸</div>
  <div class="text">일시정지됨 &nbsp;·&nbsp; Ctrl+Shift+P 로 재개</div>
</div>

<!-- 하단 컨트롤 바 -->
<div id="control-bar">
  <button id="btn-pause" title="일시정지/재개 (Ctrl+Shift+P)">⏸ 일시정지</button>
  <div class="sep"></div>
  <button id="btn-settings" title="설정 (Ctrl+Shift+S)">⚙ 설정</button>
  <button id="btn-quit" class="danger" title="종료 (Ctrl+Shift+Q)">⏻ 종료</button>
</div>

<script>
const player = document.getElementById('player');
const idleScreen = document.getElementById('idle-screen');

// 이 창이 듀얼 모니터의 보조(우측) 화면인지 판별
const isSecondary = new URLSearchParams(location.search).get('screen') === '2';

let hostUrl = '';
let dualMonitor = false;
let monitors = 1;

window.signage.getConfig().then(cfg => {
  hostUrl = cfg.hostUrl || '';
  dualMonitor = !!cfg.dualMonitor;
  monitors = cfg.monitors || 1;
});

function resolveUrl(u) {
  // 절대 URL(file://, http://)은 그대로, 상대(/uploads/..)는 호스트 프리픽스
  if (!u) return '';
  if (u.startsWith('/') && hostUrl) return hostUrl + u;
  return u;
}

// ═══════════════════════════════════════════════════════
// 보조 화면 모드: 주 창이 보내주는 미디어만 표출
// ═══════════════════════════════════════════════════════
if (isSecondary) {
  idleScreen.querySelector('.text').textContent = '우측 화면 대기 중...';
  window.signage.onScreen2Media((media) => {
    if (!media || !media.url) { showIdle(); return; }
    idleScreen.style.display = 'none';
    renderSingle(resolveUrl(media.url), media.mimeType, media.fitMode, media.sound === 'right');
  });
}

// ═══════════════════════════════════════════════════════
// 주 화면 모드: 편성표 기반 자동 재생
// ═══════════════════════════════════════════════════════
let schedule = null;
let activeEntries = [];
let currentIndex = -1;
let playTimer = null;

// 일시정지 상태 및 현재 미디어의 진행 방식(타이머 기반 여부)
let paused = false;
let curOnDone = null;
let curDuration = 0;
let curTimerBased = false;

if (!isSecondary) {
  window.signage.onScheduleUpdate((data) => {
    console.log('[Player] 편성표 수신:', data && data.entries ? data.entries.length + '개' : data);
    schedule = data;
    paused = false;                 // 새 편성표 수신 시 재생 재개
    updatePauseUI();
    startPlayback();
  });
  window.signage.onPlayCommand((files) => playFiles(files));
  window.signage.onStopCommand(() => stopPlayback());
  window.signage.onTogglePause(() => togglePause());
  setupControlBar();
} else {
  // 보조 창: 자신의 영상만 일시정지/재개
  window.signage.onTogglePause(() => {
    const v = player.querySelector('video');
    if (v) { if (v.paused) v.play().catch(() => {}); else v.pause(); }
  });
}

// ─── 일시정지 ────────────────────────────────────────────
function togglePause() {
  paused = !paused;
  if (paused) {
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
    player.querySelectorAll('video').forEach(v => v.pause());
  } else {
    player.querySelectorAll('video').forEach(v => v.play().catch(() => {}));
    // 타이머 기반(이미지 등) 미디어였다면 재개 시 타이머 재시작
    if (curTimerBased && curOnDone) {
      playTimer = setTimeout(() => curOnDone(), curDuration);
    }
  }
  updatePauseUI();
}

function updatePauseUI() {
  const ov = document.getElementById('pause-overlay');
  if (ov) ov.classList.toggle('show', paused);
  const btn = document.getElementById('btn-pause');
  if (btn) btn.textContent = paused ? '▶ 재개' : '⏸ 일시정지';
}

// ─── 하단 컨트롤 바 (마우스 움직이면 표시) ────────────────
function setupControlBar() {
  const bar = document.getElementById('control-bar');
  document.getElementById('btn-pause').addEventListener('click', () => window.signage.uiTogglePause());
  document.getElementById('btn-settings').addEventListener('click', () => window.signage.uiOpenSettings());
  document.getElementById('btn-quit').addEventListener('click', () => window.signage.uiQuit());

  let hideTimer = null;
  function showBar() {
    bar.classList.add('show');
    document.body.classList.add('controls-visible');
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      bar.classList.remove('show');
      document.body.classList.remove('controls-visible');
    }, 3000);
  }
  document.addEventListener('mousemove', showBar);
}

function startPlayback() {
  if (!schedule || !schedule.entries) return;
  activeEntries = schedule.entries.filter(e => e.active !== false);
  if (activeEntries.length === 0) { report(null); showIdle(); return; }
  idleScreen.style.display = 'none';
  currentIndex = -1;
  playNext();
}

function playNext() {
  if (!activeEntries || activeEntries.length === 0) { report(null); showIdle(); return; }

  currentIndex = (currentIndex + 1) % activeEntries.length;
  const entry = activeEntries[currentIndex];

  // 유효기간 체크
  const now = new Date();
  if (entry.validFrom && new Date(entry.validFrom) > now) return playNext();
  if (entry.validTo && new Date(entry.validTo) < now) return playNext();

  const url1 = resolveUrl(entry.url || (entry.filename ? `/uploads/${entry.filename}` : ''));
  if (!url1) return playNext();
  const url2 = resolveUrl(entry.url2 || '');

  const duration = (entry.duration || 10) * 1000;
  const fitMode = entry.fitMode || 'contain';
  const hasSecond = !!url2;
  const wantBoth = monitors >= 2 || entry.layoutType === 'split';

  const m1 = { url: url1, mimeType: entry.mimeType, fitMode, audible: entry.sound === 'left' || (entry.sound && entry.sound !== 'none' && !hasSecond) };
  const m2 = hasSecond ? { url: url2, mimeType: entry.mimeType2, fitMode, audible: entry.sound === 'right' } : null;

  if (hasSecond && wantBoth && dualMonitor) {
    // 듀얼 모니터: 좌=주 창, 우=보조 창 동시 표출
    window.signage.setScreen2Media({ url: entry.url2, mimeType: entry.mimeType2, fitMode, sound: entry.sound });
    report(entry, 'both');
    showMedia([m1], false, entry, duration, playNext);
  } else if (hasSecond && wantBoth) {
    // 단일 창에 좌/우 나란히
    report(entry, 'both');
    showMedia([m1, m2], true, entry, duration, playNext);
  } else if (hasSecond) {
    // 독립 + 단일 모니터: file1 → file2 순차
    report(entry, 'left');
    showMedia([m1], false, entry, duration, () => {
      report(entry, 'right');
      showMedia([m2], false, entry, duration, playNext);
    });
  } else {
    report(entry, 'left');
    showMedia([m1], false, entry, duration, playNext);
  }
}

// panes: [{url, mimeType, fitMode, audible}], split: 좌우 배치 여부, onDone: 완료 콜백
function showMedia(panes, split, entry, duration, onDone) {
  const existing = player.querySelector('.media-element');
  if (existing) {
    existing.classList.remove('active');
    existing.classList.add('fade-out');
    setTimeout(() => existing.remove(), 900);
  }

  const container = document.createElement('div');
  container.className = 'media-element' + (split ? ' split' : '');

  let videoForEnd = null;
  panes.forEach(p => {
    const el = createMediaEl(p);
    if (split) {
      const pane = document.createElement('div');
      pane.className = 'pane';
      pane.appendChild(el);
      container.appendChild(pane);
    } else {
      container.appendChild(el);
    }
    if (el.tagName === 'VIDEO' && !videoForEnd) videoForEnd = el;
  });

  player.appendChild(container);
  setTimeout(() => container.classList.add('active'), 50);

  if (playTimer) { clearTimeout(playTimer); playTimer = null; }

  // 대표 미디어가 영상이고 '원본 길이'면 끝날 때 다음, 아니면 duration 타이머
  const primaryIsVideo = panes[0].mimeType && panes[0].mimeType.startsWith('video');
  const videoOriginal = !split && primaryIsVideo && entry.videoDuration !== 'custom' && videoForEnd;
  curOnDone = onDone;
  curDuration = duration;
  curTimerBased = !videoOriginal;

  if (paused) {
    // 일시정지 중 새 미디어가 로드되면 즉시 멈춤 상태 유지
    container.querySelectorAll('video').forEach(v => v.pause());
    return;
  }

  if (videoOriginal) {
    videoForEnd.onended = () => onDone();
  } else {
    playTimer = setTimeout(() => onDone(), duration);
  }
}

function createMediaEl(p) {
  if (p.mimeType && p.mimeType.startsWith('video')) {
    const video = document.createElement('video');
    video.src = p.url;
    video.autoplay = true;
    video.muted = !p.audible;
    video.loop = false;
    video.playsInline = true;
    video.className = p.fitMode === 'cover' ? 'cover' : '';
    return video;
  }
  const img = document.createElement('img');
  img.src = p.url;
  img.className = p.fitMode === 'cover' ? 'cover' : '';
  return img;
}

// 보조 화면(screen=2): 단일 미디어 표출
function renderSingle(url, mimeType, fitMode, audible) {
  const existing = player.querySelector('.media-element');
  if (existing) existing.remove();
  const container = document.createElement('div');
  container.className = 'media-element active';
  container.appendChild(createMediaEl({ url, mimeType, fitMode, audible }));
  player.appendChild(container);
}

// 현재 재생 콘텐츠를 호스트에 보고 (which: 'left' | 'right' | 'both')
function report(entry, which) {
  if (isSecondary) return;
  if (!entry) { window.signage.reportPlaying(null); return; }
  const left  = { url: entry.srcUrl || entry.url, filename: entry.filename, mimeType: entry.mimeType };
  const right = { url: entry.srcUrl2 || entry.url2, filename: entry.filename2, mimeType: entry.mimeType2 };
  const payload = { monitors, layoutType: entry.layoutType };
  if (which === 'both') { payload.screen1 = left; payload.screen2 = right; }
  else if (which === 'right') { payload.screen1 = right; payload.screen2 = null; }
  else { payload.screen1 = left; payload.screen2 = null; }
  window.signage.reportPlaying(payload);
}

// 수동 재생 명령용
function playFiles(files) {
  if (!files || !files.length) return;
  idleScreen.style.display = 'none';
  activeEntries = files.map(f => ({
    url: f.url, mimeType: f.mimeType, filename: f.originalName, duration: 10, active: true, layoutType: 'independent'
  }));
  currentIndex = -1;
  playNext();
}

function stopPlayback() {
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  player.querySelectorAll('.media-element').forEach(el => el.remove());
  if (dualMonitor) window.signage.setScreen2Media(null);
  paused = false;
  updatePauseUI();
  report(null);
  showIdle();
}

function showIdle() { idleScreen.style.display = 'flex'; }
</script>
</body>
</html>
