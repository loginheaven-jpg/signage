<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디지털 게시판 — 승인 대기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.waiting-card {
  text-align: center;
  padding: 48px;
}
.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: #4ecdc4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }

h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
.subtitle { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 32px; }

.info-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px;
  display: inline-block;
  text-align: left;
  min-width: 300px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.info-row:last-child { border-bottom: none; }
.info-row .label { color: rgba(255,255,255,0.5); font-size: 13px; }
.info-row .value { font-size: 13px; font-weight: 500; }

.status-indicator {
  margin-top: 24px;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f39c12;
  animation: pulse 2s infinite;
}
.status-dot.connected { background: #4ecdc4; }
.status-dot.disconnected { background: #e74c3c; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.hint {
  margin-top: 24px;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
}
</style>
</head>
<body>
<div class="waiting-card">
  <div class="spinner"></div>
  <h1>호스트 승인 대기 중</h1>
  <p class="subtitle">호스트 관리자가 이 클라이언트를 승인하면 자동으로 재생이 시작됩니다</p>

  <div class="info-box">
    <div class="info-row">
      <span class="label">클라이언트 이름</span>
      <span class="value" id="nameDisplay">-</span>
    </div>
    <div class="info-row">
      <span class="label">호스트 서버</span>
      <span class="value" id="hostDisplay">-</span>
    </div>
    <div class="info-row">
      <span class="label">모니터</span>
      <span class="value" id="monitorDisplay">-</span>
    </div>
    <div class="info-row">
      <span class="label">클라이언트 ID</span>
      <span class="value" id="idDisplay" style="font-size:11px; font-family:monospace;">-</span>
    </div>
  </div>

  <div class="status-indicator">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">호스트 연결 중...</span>
  </div>

  <div class="hint">Ctrl+Shift+S 로 설정 변경 가능</div>
</div>

<script>
// 설정 정보 표시
window.signage.getConfig().then(cfg => {
  document.getElementById('nameDisplay').textContent = cfg.clientName || '-';
  document.getElementById('hostDisplay').textContent = cfg.hostUrl || '-';
  document.getElementById('monitorDisplay').textContent = `${cfg.monitors || 1}대`;
  document.getElementById('idDisplay').textContent = cfg.clientId || '-';
});

// 연결 상태 수신
window.signage.onConnectionStatus((data) => {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (data.connected) {
    dot.className = 'status-dot connected';
    text.textContent = '호스트 연결됨 — 승인 대기 중';
  } else {
    dot.className = 'status-dot disconnected';
    text.textContent = '호스트 연결 끊김 — 재연결 시도 중...';
  }
});
</script>
</body>
</html>
